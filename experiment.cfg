name: experiment
model_type: ImageRestorationModel
scale: 1
num_gpu: 1
manual_seed: 10

datasets:
  train:
    name: train
    type: PairedImageDataset
    dataroot_gt: /home/student_server/Qtt/NAFNet/data_new/train_sharp
    dataroot_lq: /home/student_server/Qtt/NAFNet/data_new/train_blur
    filename_tmpl: '{}'
    io_backend:
      type: disk
    gt_size: 256
    use_flip: false
    use_rot: false
    # data loader
    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 4
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: val
    type: PairedImageDataset
    dataroot_gt: /home/student_server/Qtt/NAFNet/data_new/val_sharp
    dataroot_lq: /home/student_server/Qtt/NAFNet/data_new/val_blur
    io_backend:
      type: disk

  test:
    name: test
    type: PairedImageDataset
    dataroot_gt: /home/student_server/Qtt/NAFNet/data_new/test_sharp
    dataroot_lq: /home/student_server/Qtt/NAFNet/data_new/test_blur
    io_backend:
      type: disk

network_g:
  type: NAFNetLocal
  width: 64
  enc_blk_nums: [1, 1, 1, 28]
  middle_blk_num: 1
  dec_blk_nums: [1, 1, 1, 1]

path:
  # 训练开始时不加载预训练权重；如果要从某个 checkpoint 继续训练，填这里或运行时传 --resume_state
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  optim_g:
    type: AdamW
    # 更稳妥的初始学习率，适合先观察收敛和验证曲线
    lr: !!float 2e-4
    weight_decay: 0.
    betas: [0.9, 0.9]

  scheduler:
    type: TrueCosineAnnealingLR
    T_max: 200000
    eta_min: !!float 1e-7

  total_iter: 200000
  warmup_iter: -1

  pixel_opt:
    type: PSNRLoss
    loss_weight: 1
    reduction: mean

val:
  # 只按 epoch 验证，不再使用按 iter 的 val_freq
  val_every: 20
  monitor: psnr
  save_img: false
  use_image: false
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

logger:
  print_freq: 200
  # 周期性只保存训练状态，不保存每个阶段的完整模型文件；best_model.pt 由训练代码自动覆盖保存
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~
  save_all_checkpoints: false

# 训练轮数与验证策略：
# - total_iter = 200000
# - train batch_size = 4，训练集 1085 张图，world_size=1 时每轮约 272 iter
# - 总 epoch 约 ceil(200000 / 272) = 736
# - 每 10 轮 epoch 验证一次
# - 按 psnr 判断最佳模型，最佳模型固定保存为 best_model.pt，并在更优时覆盖更新
train_schedule:
  total_epoch_approx: 736

# test runner configuration: python ./main.py --test --config_path ./experiment.cfg 会读取这里并调用 tools/test_nafnet_blind.py
test_runner:
  data_root: /home/student_server/Qtt/NAFNet/data_new
  checkpoint: experiments/models/best_model.pt
  save_dir: results/experiment_test
  device: cuda
  in_chans: 1
  test_mask_csv: /home/student_server/Qtt/NAFNet/data_new/test_mask
  image_border: 0
  width: 64
  enc_blk_nums: [1, 1, 1, 28]
  middle_blk_num: 1
  dec_blk_nums: [1, 1, 1, 1]

dist_params:
  backend: nccl
  port: 29500
